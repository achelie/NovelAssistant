    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: your-jwt-secret-key-here-change-in-production
    expiration: 86400000
  zhipu:
    api-key: 5c845d4acaa44101a3fca9e75e8e4749.up6deSiCryyv1Mbl
    base-url: https://open.bigmodel.cn/api/paas/v4
    chat-model: glm-4-flash
    embedding-model: embedding-3
    # 智谱未传 max_tokens 时默认约 1024，中文续写约千字即停；可按模型上限调高
    default-max-completion-tokens: 8192
    max-completion-tokens-ceiling: 16384
